name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            你是一位资深代码审查员。请对这个 PR 的所有变更进行详细的代码审查。

            审查要求：
            1. 通读所有变更文件，理解整体改动的目的和范围
            2. 对照项目的 CLAUDE.md 规范逐项检查
            3. 重点关注：bug、安全漏洞、类型安全、性能问题、规范违反

            输出格式（使用中文）：

            ## Code Review

            - [x] 审查步骤 1（如：读取上下文）
            - [x] 审查步骤 2（如：审查数据库变更）
            - [x] ...（根据实际变更内容列出）

            ---

            ### 总体评价

            一段话总结代码质量和整体印象。说明发现了几个什么级别的问题。

            ---

            ### 问题 / Bug

            按严重程度排列，每个问题包含：
            - 🔴 Bug — 标题（必须修复）
            - 🟡 小问题 — 标题（建议修复）
            - 🔵 建议 — 标题（可选优化）

            每个问题说明：文件路径和行号、问题描述、修复建议（附代码示例）。

            如果没有发现问题，说明 "未发现问题"，但仍需提供下面的设计观察。

            ---

            ### 设计观察（不影响合并）

            对架构设计、实现方式的客观评价，指出做得好的地方和潜在的改进方向。

            ---

            ### 结论

            一句话总结是否建议合并，以及合并前需要修复哪些问题。

